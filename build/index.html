<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Avenga radio</title>
  <link href="style/style.css" rel="stylesheet"/>
  <link
    crossorigin="anonymous"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
    rel="stylesheet"
  />
</head>
<body>
<div class="radio-container radio-container--winter d-flex flex-column justify-content-between">
  <header class="d-flex justify-content-between pt-3 header">
    <a class="header__avenga-logo z-200" href="https://www.avenga.com/career/ukraine/"></a>
    <nav class="header__social-links d-none d-sm-flex justify-content-between">
      <a class="social-link facebook z-200" href="https://www.facebook.com/AvengaGlobal/" target="_blank"></a>
      <a class="social-link instagram z-200" href="https://www.instagram.com/avenga_global/" target="_blank"></a>
      <a class="social-link linkedin z-200" href="https://www.linkedin.com/company/avenga/about/" target="_blank"></a>
    </nav>
  </header>
  <main class="main">
    <button
      class="radio-control-button z-200 mx-auto px-0"
      id="main-button"
      type="button"
    ></button>
    <div class="radio-control-button__song-info z-200">
      <p class="radio-control-button__song-info--song">
        <strong>John legend & robots</strong>
      </p>
      <p class="radio-control-button__song-info--singer">
        Compared to what
      </p>
    </div>
  </main>
  <footer class="footer d-flex justify-content-center align-items-center">
    <nav class="footer__social-links d-flex d-sm-none mx-auto justify-content-between">
      <a
        class="social-link social-link--footer_placed facebook z-200"
        href=""
        target="_blank"
      ></a>
      <a
        class="social-link social-link--footer_placed instagram z-200"
        href=""
        target="_blank"
      ></a>
      <a
        class="social-link social-link--footer_placed linkedin z-200"
        href=""
        target="_blank"
      ></a>
    </nav>
  </footer>
</div>

<script src="index.js"></script>

</body>
</html>
