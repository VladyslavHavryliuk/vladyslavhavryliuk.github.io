<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avenga radio</title>
    <link rel="stylesheet" href="style/style.css" />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="radio-container radio-container--winter d-flex flex-column justify-content-between">
      <header class="d-flex justify-content-between pt-3 header">
        <a href="https://www.avenga.com/career/ukraine/" class="header__avenga-logo z-200"></a>
        <nav
          class="header__social-links d-none d-sm-flex justify-content-between"
        >
          <a href="https://www.facebook.com/AvengaGlobal/" target="_blank" class="social-link facebook z-200"></a>
          <a href="https://www.instagram.com/avenga_global/" target="_blank" class="social-link instagram z-200"></a>
          <a href="https://www.linkedin.com/company/avenga/about/" target="_blank" class="social-link linkedin z-200"></a>
        </nav>
      </header>
      <main class="main">
        <button
          type="button"
          class="radio-control-button z-200 mx-auto px-0"
          id="main-button"
        ></button>
        <div class="radio-control-button__song-info z-200">
          <p class="radio-control-button__song-info--song">
            <strong>John legend & robots</strong>
          </p>
          <p class="radio-control-button__song-info--singer">
            Compared to what
          </p>
        </div>
      </main>
      <footer class="footer d-flex justify-content-center align-items-center">
        <nav
          class="
            footer__social-links
            d-flex d-sm-none
            mx-auto
            justify-content-between
          "
        >
          <a
            href=""
            target="_blank"
            class="social-link social-link--footer_placed facebook z-200"
          ></a>
          <a
            href=""
            target="_blank"
            class="social-link social-link--footer_placed instagram z-200"
          ></a>
          <a
            href=""
            target="_blank"
            class="social-link social-link--footer_placed linkedin z-200"
          ></a>
        </nav>
      </footer>
    </div>

    <script src="index.js" />

  </body>
</html>
