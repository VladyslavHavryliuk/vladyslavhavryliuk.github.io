<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avenga radio</title>
    <link rel="stylesheet" href="style/style.css" />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="radio-container d-flex flex-column justify-content-between">
      <header class="d-flex justify-content-between pt-3 header">
        <a href="" class="header__avenga-logo"></a>
        <nav
          class="header__social-links d-none d-sm-flex justify-content-between"
        >
          <a href="" target="_blank" class="social-link facebook"></a>
          <a href="" target="_blank" class="social-link instagram"></a>
          <a href="" target="_blank" class="social-link linkedin"></a>
        </nav>
      </header>
      <main class="main">
        <button
          type="button"
          class="radio-control-button mx-auto px-0"
          id="main-button"
        ></button>
        <div class="radio-control-button__song-info">
          <p class="radio-control-button__song-info--song">
            <strong>John legend & robots</strong>
          </p>
          <p class="radio-control-button__song-info--singer">
            Compared to what
          </p>
        </div>
      </main>
      <footer class="footer d-flex justify-content-center align-items-center">
        <nav
          class="
            footer__social-links
            d-flex d-sm-none
            mx-auto
            justify-content-between
          "
        >
          <a
            href=""
            target="_blank"
            class="social-link social-link--footer_placed facebook"
          ></a>
          <a
            href=""
            target="_blank"
            class="social-link social-link--footer_placed instagram"
          ></a>
          <a
            href=""
            target="_blank"
            class="social-link social-link--footer_placed linkedin"
          ></a>
        </nav>
      </footer>
    </div>

    <script src="index.js" />
    <script
      src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
