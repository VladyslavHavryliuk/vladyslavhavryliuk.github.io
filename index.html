<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Avenga radio</title>
    <link rel="stylesheet" href="style/style.css" />
</head>
<body>
    <div class="container flex-column">
        <header class="nav-header">
            <div>
                <a href="">
                    <img src="images/logo.svg" alt="Avenga" class="logo"></div>
                </a>
            <nav class="social-links">
                <a href="" target="_blank"><img src="images/facebook.svg" alt="facebook" class="social-icon"></a>
                <a href="" target="_blank"><img src="images/instagram.svg" alt="instagram" class="social-icon"></a>
                <a href="" target="_blank"><img src="images/linkedin.svg" alt="linkedin" class="social-icon"></a>
            </nav>
        </header>
        <main class="radio-container flex-column">
           <button class="play-pause-button"></button>
            <div class="song-info flex-column">
                <p class="singer"><strong>John legend & robots</strong></p>
                <p class="song">Compared to what</p>
            </div>
        </main>
    </div>


</body>
</html>
