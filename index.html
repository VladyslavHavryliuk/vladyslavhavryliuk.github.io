<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Avenga radio</title>
  <link href="favicon.ico" rel="shortcut icon" type="image/x-icon"/>
  <link href="style/style.css" rel="stylesheet"/>
  <link
    crossorigin="anonymous"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
    rel="stylesheet"
  />
</head>
<body>
<div class="radio-container radio-container--winter d-flex flex-column justify-content-between">
  <header class="d-flex justify-content-between pt-3">
    <a class="header__avenga-logo" href="https://www.avenga.com/career/ukraine/"></a>
    <nav class="header__social-links d-none d-sm-flex justify-content-between">
      <a class="social-link facebook" href="https://www.facebook.com/Avenga-Ukraine-210140259025305/" target="_blank"></a>
      <a class="social-link instagram" href="https://www.instagram.com/avenga_ukraine/" target="_blank"></a>
      <a class="social-link linkedin" href="https://www.linkedin.com/company/avenga/about/" target="_blank"></a>
    </nav>
  </header>

  <main class="d-flex flex-column align-items-center">
    <div
      class="my_player d-flex flex-column align-items-center"
      data-autoplay="1"
      data-player="custom"
      data-streamurl="https://myradio24.org/2925"
      data-volume="100"
      id="my_player_custom"
    ></div>

    <div
      class="d-none"
      data-imagesurl="{ 'play': './images/play.svg', 'pause': './images/pause.svg' }"
      id="my_player_custom_html"
    >
      <div class="my_play"></div>
      <div class="my_timer bold-font d-none">00:00</div>
      <div class="my_volumediv d-none">
        <div class="my_volume"></div>
      </div>
      <div class="song-info">
        <p class="song bold-font"></p>
        <p class="artist regular-font"></p>
      </div>
      <div class="bold-font d-none" data-myinfo="song"></div>
    </div>
  </main>

  <footer class="d-flex justify-content-center align-items-center">
    <nav class="footer__social-links d-flex d-sm-none justify-content-between">
      <a class="social-link facebook" href="https://www.facebook.com/Avenga-Ukraine-210140259025305/" target="_blank"></a>
      <a class="social-link instagram" href="https://www.instagram.com/avenga_ukraine/" target="_blank"></a>
      <a class="social-link linkedin" href="https://www.linkedin.com/company/avenga/about/" target="_blank"></a>
    </nav>
  </footer>
</div>

<script data-interval="15" data-port="2925" data-vmid="0" src="https://myradio24.com/player/player.js"></script>
<script src="./scripts/index.js"></script>
</body>
</html>
